opencc_config: s2t
default_report_name: report.xlsx
default_term_dict_path: data/低風險詞庫.yaml
default_high_risk_rules_path: data/高風險規則.yaml
enable_space_cleanup: true
active_profile: default

profiles:
  default:
    description: 預設規則方案
    low_risk_dict: data/低風險詞庫.yaml
    high_risk_rules: data/高風險規則.yaml
    format_config:
      body_font_name: "\u65b0\u7d30\u660e\u9ad4"
      body_font_size_pt: 12
      body_space_before_pt: 0
      body_space_after_pt: 6
      body_line_spacing_mode: at_least
      body_min_line_height_pt: 12
      body_first_line_indent_chars: 2
      heading_style_name: Heading 2

document_format:
  page_margin_top_cm: 1.27
  page_margin_bottom_cm: 1.27
  page_margin_left_cm: 1.27
  page_margin_right_cm: 1.27
  body_font_name: "\u65b0\u7d30\u660e\u9ad4"
  body_font_size_pt: 12
  body_space_before_pt: 0
  body_space_after_pt: 6
  body_line_spacing_mode: at_least
  body_min_line_height_pt: 12
  body_first_line_indent_chars: 2
  heading_style_name: Heading 2
  insert_toc: false
